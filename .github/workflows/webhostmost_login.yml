name: WebHostMost Login  

on:
  schedule:
    # 每月20号的 UTC 时间 00:00 运行
    - cron: '0 0 20 * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install puppeteer@latest

      - name: Run login script
        env:
          USERNAME_AND_PASSWORD: ${{ secrets.USERNAME_AND_PASSWORD }}
        run: node scripts/login.js
        
      - name: Upload Login Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: webhostmost-screenshots-${{ github.run_id }}
          path: ./*.png
          retention-days: 30             
          if-no-files-found: ignore
          
      - name: 🧹 Clean Worker workflow
        uses: MajorScruffy/delete-old-workflow-runs@v0.3.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          older-than-seconds: 3600  
